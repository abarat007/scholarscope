name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        # Surface the failure tail as a workflow annotation so failures are
        # diagnosable from the public checks API without downloading logs.
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest.out || {
            detail=$(sed -n '/=\{5,\} ERRORS/,$p' pytest.out)
            [ -n "$detail" ] || detail=$(tail -c 3000 pytest.out)
            echo "::error title=pytest failed::$(echo "$detail" | head -c 3000 | tr '\n' ' ')"
            exit 1
          }
